<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Auth Relay Error</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --panel: #171717;
        --text: #ededed;
        --muted: #a3a3a3;
        --warn: #f59e0b;
        --border: #2b2b2b;
      }
      body {
        font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
      }
      .panel {
        max-width: 520px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
      }
      h1 { margin-top: 0; font-size: 20px; }
      p { color: var(--muted); }
      code {
        display: block;
        white-space: pre-wrap;
        margin-top: 8px;
        background: #111;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px;
        color: var(--warn);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Relay failed</h1>
      <p>The localhost callback could not be relayed to auth-manager.</p>
      <code id="reason">Unknown error</code>
    </div>
    <script src="page-status.js"></script>
  </body>
</html>
