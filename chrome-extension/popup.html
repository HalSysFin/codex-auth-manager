<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Auth Relay</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --panel: #171717;
        --text: #ededed;
        --muted: #a3a3a3;
        --border: #2b2b2b;
        --ok: #10b981;
        --warn: #f59e0b;
      }
      body {
        margin: 0;
        width: 340px;
        font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        padding: 14px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 16px;
        letter-spacing: 0.2px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      p {
        margin: 0 0 12px;
        font-size: 13px;
        line-height: 1.4;
        color: var(--muted);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--ok);
        box-shadow: 0 0 6px rgba(16, 185, 129, 0.5);
      }
      .btn {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 600;
        background: #171717;
        color: var(--text);
        cursor: pointer;
      }
      .btn:hover {
        border-color: #3a3a3a;
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .btn.primary {
        background: #ededed;
        color: #0a0a0a;
        border: none;
      }
      .toggleRow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 0 0 14px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #111;
      }
      .toggleCopy {
        min-width: 0;
      }
      .toggleLabel {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }
      .toggleHint {
        margin-top: 3px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.35;
      }
      .switch {
        position: relative;
        display: inline-flex;
        align-items: center;
      }
      .switch input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }
      .slider {
        position: relative;
        width: 44px;
        height: 24px;
        border-radius: 999px;
        background: #333;
        border: 1px solid #424242;
        transition: background 0.2s ease, border-color 0.2s ease;
      }
      .slider::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fafafa;
        transition: transform 0.2s ease;
      }
      .switch input:checked + .slider {
        background: rgba(16, 185, 129, 0.22);
        border-color: rgba(16, 185, 129, 0.7);
      }
      .switch input:checked + .slider::after {
        transform: translateX(20px);
      }
      .toggleState {
        min-width: 22px;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        text-align: right;
      }
      .btn.link {
        margin-top: 8px;
        padding: 0;
        height: auto;
        border: 0;
        background: transparent;
        color: #cbd5e1;
        font-size: 12px;
        text-align: left;
      }
      .footer {
        margin-top: 10px;
        font-size: 11px;
        color: #737373;
        line-height: 1.45;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        white-space: pre-wrap;
        color: var(--muted);
        min-height: 16px;
      }
      .ok {
        color: var(--ok);
      }
      .err {
        color: var(--warn);
      }
      code {
        background: #111;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 1px 5px;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1><span class="dot"></span>Auth Relay</h1>
        <p>Start relay login, complete auth in the opened tab, then localhost callback is captured and sent to auth-manager.</p>
        <div class="toggleRow">
          <div class="toggleCopy">
            <div class="toggleLabel">Relay Capture</div>
            <div class="toggleHint">Turn callback interception on or off from the popup.</div>
          </div>
          <label class="switch" aria-label="Toggle relay capture">
            <input id="relayEnabled" type="checkbox" />
            <span class="slider"></span>
          </label>
          <div id="relayState" class="toggleState">On</div>
        </div>
        <button id="startBtn" class="btn primary" type="button">Start Relay Login</button>
        <button id="optionsBtn" class="btn link" type="button">Settings</button>
        <div id="status" class="status"></div>
        <div class="footer">
          Open popup: <code>Ctrl+Shift+Y</code><br />
          Start relay: <code>Ctrl+Shift+L</code>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
