<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Auth Relay</title>
    <style>
      :root {
        --bg: #091016;
        --panel: #15202b;
        --text: #ecf3ff;
        --muted: #a1aec2;
        --accent: #85d6ff;
        --accent-2: #97f7b1;
        --danger: #ff8a8a;
        --border: rgba(255, 255, 255, 0.1);
      }
      body {
        margin: 0;
        width: 340px;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 85% -10%, rgba(133,214,255,0.18), transparent 40%),
                    radial-gradient(circle at 10% 120%, rgba(151,247,177,0.15), transparent 45%),
                    var(--bg);
        color: var(--text);
      }
      .wrap {
        padding: 14px 14px 12px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 16px;
        letter-spacing: 0.3px;
      }
      p {
        margin: 0 0 12px;
        font-size: 13px;
        line-height: 1.4;
        color: var(--muted);
      }
      button {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-weight: 600;
        background: linear-gradient(90deg, #2a7db0, #25a26f);
        color: #f8fdff;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .row {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      .link-btn {
        border: 0;
        background: transparent;
        color: var(--accent);
        font-size: 12px;
        padding: 0;
        cursor: pointer;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        white-space: pre-wrap;
        color: var(--muted);
      }
      .ok {
        color: var(--accent-2);
      }
      .err {
        color: var(--danger);
      }
      code {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 1px 5px;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Codex Auth Relay</h1>
      <p>Start login relay, then complete auth in the opened tab. Localhost callback will be captured and relayed automatically.</p>
      <button id="startBtn" type="button">Start Relay Login</button>
      <div class="row">
        <button id="optionsBtn" class="link-btn" type="button">Settings</button>
      </div>
      <div id="status" class="status"></div>
      <p style="margin-top: 12px; margin-bottom: 0; font-size: 11px; color: #4b5568;">
        Shortcut to open popup: <code>Ctrl+Shift+Y</code><br />
        Direct start shortcut: <code>Ctrl+Shift+L</code>
      </p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
