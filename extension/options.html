<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Auth Relay Settings</title>
    <style>
      :root {
        --bg: #091016;
        --panel: #15202b;
        --text: #ecf3ff;
        --muted: #a1aec2;
        --accent: #85d6ff;
        --accent-2: #97f7b1;
        --danger: #ff8a8a;
        --border: rgba(255, 255, 255, 0.1);
      }
      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 85% -10%, rgba(133,214,255,0.18), transparent 40%),
                    radial-gradient(circle at 10% 120%, rgba(151,247,177,0.15), transparent 45%),
                    var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 720px;
        margin: 24px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px;
      }
      h1 {
        margin: 0 0 14px;
        font-size: 22px;
      }
      .field {
        margin-bottom: 14px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--text);
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.2);
        color: var(--text);
        border-radius: 8px;
        padding: 9px 10px;
        font-size: 14px;
      }
      .hint {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
      }
      .actions {
        margin-top: 16px;
      }
      button {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        background: linear-gradient(90deg, #2a7db0, #25a26f);
        color: #f8fdff;
        cursor: pointer;
      }
      #status {
        margin-top: 12px;
        font-size: 13px;
        color: var(--muted);
      }
      .ok {
        color: var(--accent-2);
      }
      .err {
        color: var(--danger);
      }
      code {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 1px 5px;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Codex Auth Relay Settings</h1>

        <div class="field">
          <label for="baseUrl">Auth Manager Base URL</label>
          <input id="baseUrl" type="text" placeholder="http://localhost:8080" />
          <div class="hint">Example: <code>http://localhost:8080</code> or <code>https://auth.example.com</code></div>
        </div>

        <div class="field">
          <label for="bearerToken">Internal API Bearer Token (Optional)</label>
          <input id="bearerToken" type="password" placeholder="Leave empty if INTERNAL_API_TOKEN is not set" />
          <div class="hint">Used as <code>Authorization: Bearer &lt;token&gt;</code>.</div>
        </div>

        <div class="actions">
          <button id="saveBtn" type="button">Save Settings</button>
        </div>

        <div id="status"></div>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
